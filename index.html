<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HC Decor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>HC DECOR</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#categories">Shop</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Premium Home Decor Essentials</h2>
  <p>Doormats • Table Mats • Table Covers • Curtains</p>
</section>

<section id="categories">
  <h2>Categories</h2>

  <div class="grid">
    <div class="card">Doormats</div>
    <div class="card">Table Mats</div>
    <div class="card">Table Covers</div>
    <div class="card">Curtains</div>
  </div>
</section>

<section id="contact">
  <h2>Contact Us</h2>
  <form>
    <input placeholder="Name" />
    <input placeholder="Phone" />
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 HC Decor</p>
</footer>

</body>
</html>
